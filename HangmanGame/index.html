<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Hangman Game</title>
        <!-- linking css  -->
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="game-modal">
            <div class="gcontainer">
                <img src="images/lost.gif" alt="gif">
                <h4>Game over!</h4>
                <p>The correct words was : <b>rainbow </b></p>
                <button class="play-again">Play Again</button>
            </div>
        </div>
        <div class="container">
            <!-- hangman character box  -->
            <div class="hangman-box">
                <img src="images/hangman-0.svg" alt="hangman-img">
                <h1>Hangman Game</h1>
            </div>

            <!-- Word game box  -->
            <ul class="game-box">
                <ul class="word-display">
                    <li class="letter"></li>
                    <li class="letter"></li>
                    <li class="letter guessed">N</li>
                    <li class="letter"></li>
                    <li class="letter"></li>
                    <li class="letter"></li>
                    <li class="letter"></li>

                </ul>

                <!-- Text for hint  -->
                <h4 class="hint-text">
                    Hint: <b>Lorem ipsum dolor sit, amet consectetur
                        adipisicing elit. Corporis, earum alias voluptates
                        explicabo
                        veritatis odio!</b> </h4>

                <!-- Msg fro the guesses incorrect words  -->
                <h4 class="guesses-text">
                    Incorrect guesses:
                    <b>0 / 6</b>
                </h4>

                <!-- Keyboard with Alphabet letters -->
                <div class="keyboard">
                    <button>a</button> <button>b</button> <button>c</button>
                    <button>d</button> <button>e</button> <button>f</button>
                    <button>g</button> <button>h</button> <button>i</button>
                    <button>j</button> <button>k</button> <button>l</button>
                    <button>m</button> <button>n</button> <button>o</button>
                    <button>p</button> <button>q</button> <button>r</button>
                    <button>s</button> <button>t</button> <button>u</button>
                    <button>v</button> <button>w</button> <button>x</button>
                    <button>y</button> <button>z</button>
                </div>

            </div>

        </div>

        <!-- Linking JavaScript File  -->
        <script src="script.js"></script>
    </body>
</html>
